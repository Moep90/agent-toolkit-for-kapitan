name: Dependency Review

# Blocks PRs that introduce known-vulnerable dependencies. Uses only GITHUB_TOKEN.
# Pin actions to SHAs before going public.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
