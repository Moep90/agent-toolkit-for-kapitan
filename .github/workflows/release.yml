name: Release

# Every push to main cuts a release: the next version is computed from Conventional
# Commits, tagged, and turned into a GitHub release. When the PUBLISH_ENABLED repository
# variable is "true", the package is also built and published to PyPI (Trusted Publishing)
# and the Model Context Protocol registry. Actions are pinned to full commit SHAs;
# Dependabot keeps them fresh.

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the tag and the GitHub release
      id-token: write # PyPI Trusted Publishing and MCP registry OIDC
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Compute next version from Conventional Commits
        id: tag
        uses: mathieudutour/github-tag-action@a22cf08638b34d5badda920f9daf6e72c477b07b # v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          release_branches: main
          tag_prefix: v

      - name: Create GitHub release
        if: steps.tag.outputs.new_tag != ''
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        if: steps.tag.outputs.new_tag != '' && vars.PUBLISH_ENABLED == 'true'

      - name: Build with the released version
        if: steps.tag.outputs.new_tag != '' && vars.PUBLISH_ENABLED == 'true'
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION_FOR_KAPITAN_MCP_SERVER: ${{ steps.tag.outputs.new_version }}
        run: |
          sed -i "s/\"version\": \"0.0.0\"/\"version\": \"${{ steps.tag.outputs.new_version }}\"/g" server.json
          uv --directory tools/kapitan-mcp build

      - name: Publish to PyPI
        if: steps.tag.outputs.new_tag != '' && vars.PUBLISH_ENABLED == 'true'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: tools/kapitan-mcp/dist/

      - name: Publish to the MCP registry
        if: steps.tag.outputs.new_tag != '' && vars.PUBLISH_ENABLED == 'true'
        run: |
          curl -sSL -o mcp-publisher.tar.gz \
            "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz"
          tar xzf mcp-publisher.tar.gz mcp-publisher
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
