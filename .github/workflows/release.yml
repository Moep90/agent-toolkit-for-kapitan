name: Release

# Every push to main computes the next version from Conventional Commits. When a release is
# warranted, the version is stamped into the plugin manifests and README pins and committed
# back to main, then that commit is tagged and turned into a GitHub release. With the
# PUBLISH_ENABLED repository variable set to "true", the package is also built and published
# to PyPI (Trusted Publishing) and the Model Context Protocol registry.
#
# The stamp-and-commit step needs RELEASE_TOKEN, a personal access token from a repo admin,
# because main is protected and the default GITHUB_TOKEN cannot push to it. Without
# RELEASE_TOKEN the stamp is skipped and the merge commit is tagged as-is, so releases never
# break; the manifests just keep their previous version until the token is configured.
#
# Actions are pinned to full commit SHAs; Dependabot keeps them fresh.

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the tag, the release, and the stamp commit
      id-token: write # PyPI Trusted Publishing and MCP registry OIDC
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Compute next version from Conventional Commits
        id: tag
        uses: mathieudutour/github-tag-action@a22cf08638b34d5badda920f9daf6e72c477b07b # v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: false # only feat:/fix:/breaking cut a release; docs:/chore:/ci: do not
          release_branches: main
          tag_prefix: v
          dry_run: true # compute only; this workflow creates the tag after stamping

      - name: Detect the release token
        id: gate
        run: echo "has_token=${{ secrets.RELEASE_TOKEN != '' }}" >> "$GITHUB_OUTPUT"

      - name: Stamp the version and commit it back to main
        if: steps.tag.outputs.new_tag != '' && steps.gate.outputs.has_token == 'true'
        env:
          VER: ${{ steps.tag.outputs.new_version }}
          TAG: ${{ steps.tag.outputs.new_tag }}
        run: |
          sed -i -E "s/^VERSION = .*/VERSION = \"${VER}\"/" scripts/sync_plugins.py
          python3 scripts/sync_plugins.py
          sed -i -E "s/@v[0-9]+\.[0-9]+\.[0-9]+/@v${VER}/g" README.md
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            # [skip ci] stops this push from re-triggering the release workflow.
            git commit -am "chore(release): ${TAG} [skip ci]"
            git push origin HEAD:main
          fi

      - name: Tag the release
        if: steps.tag.outputs.new_tag != ''
        env:
          TAG: ${{ steps.tag.outputs.new_tag }}
        run: |
          git tag "${TAG}"
          git push origin "${TAG}"

      - name: Create GitHub release
        if: steps.tag.outputs.new_tag != ''
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        if: steps.tag.outputs.new_tag != '' && vars.PUBLISH_ENABLED == 'true'

      - name: Build with the released version
        if: steps.tag.outputs.new_tag != '' && vars.PUBLISH_ENABLED == 'true'
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION_FOR_KAPITAN_MCP_SERVER: ${{ steps.tag.outputs.new_version }}
        run: |
          sed -i "s/\"version\": \"0.0.0\"/\"version\": \"${{ steps.tag.outputs.new_version }}\"/g" server.json
          uv --directory tools/kapitan-mcp build

      - name: Publish to PyPI
        if: steps.tag.outputs.new_tag != '' && vars.PUBLISH_ENABLED == 'true'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: tools/kapitan-mcp/dist/

      - name: Publish to the MCP registry
        if: steps.tag.outputs.new_tag != '' && vars.PUBLISH_ENABLED == 'true'
        run: |
          curl -sSL -o mcp-publisher.tar.gz \
            "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz"
          tar xzf mcp-publisher.tar.gz mcp-publisher
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
