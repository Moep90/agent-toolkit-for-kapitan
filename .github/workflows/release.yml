name: Release

# Publishes kapitan-mcp-server to PyPI via Trusted Publishing (OIDC), no long-lived tokens.
# Pin actions to SHAs before going public.

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
      - run: uv --directory tools/kapitan-mcp build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: tools/kapitan-mcp/dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # required for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
